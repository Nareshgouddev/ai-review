# ============================================================
# Datasource / MariaDB
# ============================================================
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/uireview
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# ============================================================
# File upload limits
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# ============================================================
# Anthropic / Claude settings
# ============================================================
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-sonnet-4-5
anthropic.max-tokens=4096
# Timeout in milliseconds (default 12 seconds)
anthropic.timeout-ms=12000

# ============================================================
# Rate limiting
# ============================================================
rate-limit.requests-per-minute=10

# ============================================================
# CORS
# ============================================================
frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Actuator — expose only the health endpoint
# ============================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
